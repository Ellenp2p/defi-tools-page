<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yeap preview_redeem 查询</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        max-width: 900px;
        margin: 24px auto;
        padding: 0 16px;
        line-height: 1.45;
      }
      h1, h2 { margin-bottom: 8px; }
      .card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 14px;
        margin-bottom: 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 12px;
      }
      label { display: block; font-size: 14px; margin-bottom: 4px; }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 8px;
        border: 1px solid #bbb;
        border-radius: 6px;
        font-size: 14px;
      }
      button {
        margin-top: 8px;
        padding: 8px 12px;
        border: 1px solid #888;
        background: #f5f5f5;
        border-radius: 6px;
        cursor: pointer;
      }
      code { background: #f8f8f8; padding: 2px 4px; border-radius: 4px; }
      .muted { color: #666; font-size: 13px; }
      .ok { color: #0b7a0b; }
      .err { color: #b00020; }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th, td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
        font-size: 14px;
      }
      th { background: #fafafa; }
    </style>
  </head>
  <body>
    <h1>Yeap preview_redeem 查询</h1>
    <p class="muted">输入用户地址，自动查询 YEAP USDT / YEAP USDC 两种包装代币当前可赎回数量。</p>

    <div class="card">
      <h2>查询可赎回数量</h2>
      <div class="grid">
        <div>
          <label for="quickFullnodeUrl">Fullnode URL</label>
          <input id="quickFullnodeUrl" value="https://fullnode.mainnet.aptoslabs.com/v1" />
        </div>
        <div>
          <label for="quickUserAddress">用户地址</label>
          <input id="quickUserAddress" placeholder="0x..." />
        </div>
      </div>
      <button id="queryPreviewBtn">查询</button>
      <p id="previewStatus" class="muted"></p>
      <table>
        <thead>
          <tr>
            <th>代币</th>
            <th>metadata 地址</th>
            <th>用户份额（raw）</th>
            <th>preview_redeem（raw）</th>
          </tr>
        </thead>
        <tbody id="previewRows">
          <tr><td colspan="4" class="muted">等待查询...</td></tr>
        </tbody>
      </table>
    </div>

    <script>
      const MAX_ERROR_DETAIL_CHARS = 180;
      // 当前 YEAP 主网包装代币 metadata（来自本次需求提供地址，若协议升级请同步更新）
      const WRAPPED_TOKENS = [
        { label: 'YEAP USDT 包装代币', metadata: '0x560adc958571709b69d4dfaef2dd994b9e77758beddbf20c5ac584bfec08fe0c' },
        { label: 'YEAP USDC 包装代币', metadata: '0x6dc2b4cd0edc7aecd0aefad2864af87a2cc992a01f8fcf3ff1434ae93a7ecf39' },
      ];
      const PREVIEW_REDEEM_FUNCTION = '0x7b90b95e1060d9d2e424c6687ba03cccaed6996cccd4868b759c9fca361fa70::vault_lens::preview_redeem';
      const BALANCE_FUNCTION = '0x1::primary_fungible_store::balance';
      const METADATA_TYPE_ARG = '0x1::fungible_asset::Metadata';

      function normalizeAddress(input) {
        const s = String(input || '').trim().toLowerCase();
        if (!s) return '';
        const normalized = s.startsWith('0x') ? s : `0x${s}`;
        const hex = normalized.slice(2);
        if (!hex || !/^[0-9a-f]+$/.test(hex)) {
          throw new Error(`地址格式无效: ${input}`);
        }
        return normalized;
      }

      function parseBigIntField(v, fieldName) {
        if (v === undefined || v === null || v === '') throw new Error(`${fieldName} 为空`);
        const s = String(v).trim();
        if (!/^[-]?\d+$/.test(s)) throw new Error(`${fieldName} 不是整数: ${s}`);
        return BigInt(s);
      }

      async function callView(fullnodeUrl, fn, args, typeArguments = []) {
        const url = `${fullnodeUrl}/view`;
        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            function: fn,
            type_arguments: typeArguments,
            arguments: args,
          }),
        });
        if (!resp.ok) {
          const detail = await resp.text();
          const detailShort = detail.length > MAX_ERROR_DETAIL_CHARS
            ? `${detail.slice(0, MAX_ERROR_DETAIL_CHARS)}...(仅展示前${MAX_ERROR_DETAIL_CHARS}字符)`
            : detail;
          throw new Error(`${fn} 调用失败: ${resp.status} ${detailShort}`);
        }
        return resp.json();
      }

      function requireViewFirstValue(result, fnName) {
        if (!Array.isArray(result) || result.length === 0) {
          throw new Error(`${fnName} 返回结果为空或格式异常`);
        }
        return result[0];
      }

      function renderPreviewRows(rows) {
        const tbody = document.getElementById('previewRows');
        if (!rows.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="muted">没有可展示的数据</td></tr>';
          return;
        }
        tbody.innerHTML = rows.map((row) => `
          <tr>
            <td>${row.label}</td>
            <td><code>${row.metadata}</code></td>
            <td>${row.balanceRaw}</td>
            <td>${row.previewRedeemRaw}</td>
          </tr>
        `).join('');
      }

      async function queryPreviewRedeemByUser() {
        const status = document.getElementById('previewStatus');
        status.className = 'muted';
        try {
          const fullnodeUrl = document.getElementById('quickFullnodeUrl').value.replace(/\/$/, '');
          const userAddress = normalizeAddress(document.getElementById('quickUserAddress').value);
          if (!fullnodeUrl || !userAddress) throw new Error('请先填写 Fullnode URL 和用户地址');

          const rows = [];
          for (const token of WRAPPED_TOKENS) {
            const metadataAddress = normalizeAddress(token.metadata);
            const balanceResp = await callView(
              fullnodeUrl,
              BALANCE_FUNCTION,
              [userAddress, metadataAddress],
              [METADATA_TYPE_ARG]
            );
            const balanceRaw = parseBigIntField(
              requireViewFirstValue(balanceResp, BALANCE_FUNCTION),
              `${token.label} 用户份额`
            );

            const redeemResp = await callView(
              fullnodeUrl,
              PREVIEW_REDEEM_FUNCTION,
              [metadataAddress, balanceRaw.toString()]
            );
            const previewRedeemRaw = parseBigIntField(
              requireViewFirstValue(redeemResp, PREVIEW_REDEEM_FUNCTION),
              `${token.label} preview_redeem`
            );

            rows.push({
              label: token.label,
              metadata: metadataAddress,
              balanceRaw: balanceRaw.toString(),
              previewRedeemRaw: previewRedeemRaw.toString(),
            });
          }

          renderPreviewRows(rows);
          status.textContent = '查询成功';
          status.className = 'muted ok';
        } catch (err) {
          status.textContent = `查询失败：${err.message}`;
          status.className = 'muted err';
        }
      }

      document.getElementById('queryPreviewBtn').addEventListener('click', queryPreviewRedeemByUser);
    </script>
  </body>
</html>
